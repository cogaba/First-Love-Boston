<title>Music Sonta — First Love Church Boston</title>

* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --white:#FFFFFF; --off:#FFFFFF; --dark:#1E1B2E;
}
body {
  font-family:'Nunito',sans-serif;
  background:#FFFFFF;
  color:var(--dark);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HERO ── */
.hero {
  position:relative;
  padding:44px 24px 70px;
  text-align:center;
  overflow:hidden;
  min-height:280px;
  background:linear-gradient(135deg,#1E1B2E 0%,#2D1B69 50%,#1a0533 100%);
}
.hero-overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(8,4,25,0.70) 0%,rgba(18,4,50,0.62) 40%,rgba(28,4,60,0.82) 100%);
  z-index:1;
}
.notes {position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:2;}
.notes span {
  position:absolute;font-size:32px;color:#fff;opacity:0.08;
  animation:floatN 9s ease-in-out infinite;
}
.notes span:nth-child(1){left:4%;top:8%;animation-delay:0s;font-size:48px}
.notes span:nth-child(2){left:14%;top:62%;animation-delay:1.5s;font-size:26px}
.notes span:nth-child(3){left:28%;top:18%;animation-delay:3s;font-size:36px}
.notes span:nth-child(4){left:52%;top:72%;animation-delay:0.8s;font-size:22px}
.notes span:nth-child(5){left:68%;top:12%;animation-delay:2.2s;font-size:40px}
.notes span:nth-child(6){left:82%;top:58%;animation-delay:1s;font-size:30px}
.notes span:nth-child(7){left:93%;top:28%;animation-delay:3.5s;font-size:24px}
@keyframes floatN{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-20px) rotate(6deg)}}
.hero-inner{position:relative;z-index:3;}
.church-name {
  display:inline-block;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.28);
  color:rgba(255,255,255,0.92);
  font-size:11px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;
  padding:7px 22px;border-radius:50px;
  margin-bottom:18px;backdrop-filter:blur(8px);
}
.hero h1 {
  font-family:'Abril Fatface',serif;
  font-size:clamp(44px,11vw,78px);
  color:#fff;line-height:1;
  letter-spacing:-2px;margin-bottom:8px;
  text-shadow:0 2px 20px rgba(0,0,0,0.5);
}
.hero h1 .grad {
  background:linear-gradient(90deg,#FCD34D,#F472B6,#818CF8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub {
  color:rgba(255,255,255,0.7);
  font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:28px;
}
.refresh-btn {
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;padding:10px 24px;border-radius:50px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;transition:all 0.2s;backdrop-filter:blur(6px);
}
.refresh-btn:hover{background:rgba(255,255,255,0.25);transform:translateY(-2px);}
.spin-icon{display:inline-block;}
.sync-lbl{display:block;color:rgba(255,255,255,0.45);font-size:11px;margin-top:8px;}

/* ── TABS ── */
.tab-bar {
  display:flex;max-width:820px;margin:0 auto;padding:0 12px;
  position:relative;z-index:5;gap:4px;transform:translateY(-8px);
}
.tab-btn {
  flex:1;padding:13px 8px 11px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:0.3px;transition:all 0.25s;color:rgba(255,255,255,0.65);
  border-radius:14px 14px 0 0;
}
.tab-btn[data-tab="glgc"]{background:linear-gradient(135deg,#5B21B6,#9D174D);}
.tab-btn[data-tab="flm"] {background:linear-gradient(135deg,#0E7490,#065F46);}
.tab-btn[data-tab="pw"]  {background:linear-gradient(135deg,#C2410C,#991B1B);}
.tab-btn.active{color:#fff;transform:translateY(-4px);box-shadow:0 -4px 20px rgba(0,0,0,0.2);opacity:1;}
.tab-btn:not(.active){opacity:0.55;}
.tab-sub{display:block;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.7;margin-top:2px;}

/* ── MAIN ── */
.main{max-width:820px;margin:0 auto;padding:20px 12px 60px;background:#fff;}
body{background:#fff;}
.tab-panel{display:none;animation:panelIn 0.3s ease;}
.tab-panel.active{display:block;}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  background:rgba(255,255,255,0.2);
  border-radius:50px;padding:5px 14px;
  font-size:12px;font-weight:800;

function renderSched(k){
  const tab=TABS[k],cont=document.getElementById('s-'+k);
  cont.innerHTML='';
  let lastDate='';
  tab.data.forEach(row=>{
    const tod=isToday(row.date),past=isPast(row.date)&&!tod;
    const blank=isBlank(row.song),songOk=isSong(row.song),hasLead=!isNA(row.lead);
    let cls='srow';
    if(tod)cls+=' today';
    if(past)cls+=' past';
    if(blank)cls+=' empty-row';
    if(songOk)cls+=' clickable';
    const oc=songOk?'onclick="openSong(\''+k+'\',\''+esc(row.song)+'\',\''+esc(row.lead||'')+'\',\''+esc(row.track||'')+'\',\''+esc(row.video||'')+'\',\''+row.date+'\')"':'';
    const typeBadge = row.type ? '<span style="display:inline-block;font-size:9px;font-weight:900;letter-spacing:1px;padding:2px 8px;border-radius:50px;margin-right:6px;'+(row.type==='W'?'background:#EEF2FF;color:#4338CA;':'background:#FDF2F8;color:#9D174D;')+'">'+row.type+'</span>' : '';
    const songHtml=blank?'<span class="srow-song tba">TBA</span>':songOk?'<span class="srow-song">'+typeBadge+row.song+'</span>':'<span class="srow-song dim">'+row.song+'</span>';
    const leadHtml=hasLead?'<span class="srow-lead hl">'+row.lead+'</span>':'<span class="srow-lead none">—</span>';
    const badge=tod?'<div class="today-badge">Today</div>':'';
    // Show date only on first row of each date group
    const dateLabel = row.date!==lastDate ? fmtShort(row.date)+badge : '';
    lastDate=row.date;
    cont.innerHTML+='<div class="'+cls+'" '+oc+'><div class="srowdate">'+dateLabel+'</div><div>'+songHtml+'</div>'+leadHtml+'</div>';
  });
}

  const tab=TABS[k];
  document.getElementById('mHd').className='modal-hd '+k;

  else{b+='<div class="mlink"><div class="mlink-ico ico-n">🎵</div><div><div class="mlink-lbl">Track & Lyrics</div><div class="mlink-val na">Not available</div></div></div>';}
  if(isLink(video)){b+='<a class="mlink go" href="'+video+'" target="_blank"><div class="mlink-ico ico-v">▶</div><div><div class="mlink-lbl">Video Reference</div><div class="mlink-val">Watch on YouTube →</div></div><div class="mlink-arr">›</div></a>';}
  else{b+='<div class="mlink"><div class="mlink-ico ico-n">▶</div><div><div class="mlink-lbl">Video Reference</div><div class="mlink-val na">Not available</div></div></div>';}

function closeSong(){document.getElementById('songOv').classList.remove('open');}

function buildMsg(k){
  const tab=TABS[k],row=getThisWeek(tab.data);
  let m='🎵 *First Love Church — Boston*\n*'+tab.name+'*\n📅 *'+fmtLong(row.date)+'*\n\n';
  m+='🎶 *Song:* '+row.song+'\n';
  if(!isNA(row.lead))m+='🎤 *Lead:* '+row.lead+'\n';
  if(isLink(row.track))m+='\n📖 *Track & Lyrics:*\n'+row.track+'\n';
  else if(row.track&&row.track!=='NA')m+='\n📖 *Track & Lyrics:* '+row.track+'\n';
  if(isLink(row.video))m+='\n▶️ *Video Reference:*\n'+row.video+'\n';
  m+='\n_Come prepared and ready to worship!_ 🙏';
  return m;
}

function openWa(k){
  waMsg=buildMsg(k);
  document.getElementById('waBox').textContent=waMsg;
  const b=document.getElementById('cpBtn');
  b.textContent='📋 Copy';b.classList.remove('ok');
  document.getElementById('waOv').classList.add('open');
}
function closeWa(){document.getElementById('waOv').classList.remove('open');}
function copyWa(){
  navigator.clipboard.writeText(waMsg).catch(()=>{
    const t=document.createElement('textarea');t.value=waMsg;
    document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  const b=document.getElementById('cpBtn');
  b.textContent='✓ Copied!';b.classList.add('ok');
  setTimeout(()=>{b.textContent='📋 Copy';b.classList.remove('ok');},2500);
}
function sendWa(){window.open('https://wa.me/?text='+encodeURIComponent(waMsg),'_blank');}

function switchTab(k){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===k));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='p-'+k));
}

function doRefresh(){
  const si=document.getElementById('spinIcon');
  si.style.animation='spinA 0.5s linear infinite';
  document.getElementById('syncLbl').textContent='Data updated from Google Sheets…';
  setTimeout(()=>{
    renderAll();
    const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('syncLbl').textContent='✓ Synced at '+now;
    si.style.animation='';
  },800);
}

function renderAll(){
  ['glgc','flm','pw'].forEach(k=>{renderBanner(k);renderSched(k);});
}

const sty=document.createElement('style');
sty.textContent='@keyframes spinA{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
document.head.appendChild(sty);

document.getElementById('songOv').addEventListener('click',e=>{if(e.target===document.getElementById('songOv'))closeSong();});
document.getElementById('waOv').addEventListener('click',e=>{if(e.target===document.getElementById('waOv'))closeWa();});

window.addEventListener('DOMContentLoaded',()=>{renderAll();});
</script>
